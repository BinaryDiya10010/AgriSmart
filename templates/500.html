{% extends "base.html" %}

{% block title %}500 Error - AgriSmart{% endblock %}

{% block content %}
<div class="container" style="padding: 5rem 0; text-align: center;">
    <h1 style="font-size: 5rem; color: var(--medium-gray);">500</h1>
    <h2 style="color: var(--dark-charcoal);">Internal Server Error</h2>
    <p style="color: var(--medium-gray); margin: 2rem 0;">
        Something went wrong on our end. Please try again later.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
