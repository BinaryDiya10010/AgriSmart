{% extends "base.html" %}

{% block title %}Page Not Found - AgriSmart{% endblock %}

{% block content %}
<div class="container" style="padding: 5rem 0; text-align: center;">
    <h1 style="font-size: 5rem; color: var(--medium-gray);">404</h1>
    <h2 style="color: var(--dark-charcoal);">Page Not Found</h2>
    <p style="color: var(--medium-gray); margin: 2rem 0;">
        The page you're looking for doesn't exist.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
